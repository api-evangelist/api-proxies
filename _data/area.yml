features:
- name: Layer 7 Reverse Proxying
  description: API proxies terminate HTTP/HTTPS connections from clients and forward
    requests to upstream API services, hiding internal topology and providing a single
    front door.
- name: TLS Termination and mTLS
  description: Proxies like NGINX, HAProxy, Envoy, and Linkerd2-proxy terminate TLS
    at the edge and can enforce mutual TLS between services in a mesh.
- name: Routing and Traffic Splitting
  description: Edge proxies route requests by host, path, header, or method, and support
    traffic splitting, canary releases, and blue-green deployments.
- name: Rate Limiting and Throttling
  description: Reverse proxies enforce rate limits, quotas, and concurrency limits
    at the edge to protect upstream APIs from abuse and overload.
- name: Caching and HTTP Acceleration
  description: Caching proxies like Varnish, NGINX, Squid, and Cloudflare cache API
    responses to reduce upstream load and improve client latency.
- name: Observability and Access Logging
  description: Proxies emit structured access logs, metrics, and traces (OpenTelemetry,
    Prometheus, statsd) for every request crossing the edge or mesh.
- name: Service Mesh Sidecar Pattern
  description: Sidecar proxies like Envoy, Linkerd2-proxy, and Consul Connect run
    alongside each service to provide identity, encryption, retries, and traffic policy
    without changing application code.
- name: WAF and Edge Security
  description: Edge proxies and CDNs like Cloudflare, Akamai, and Azure Application
    Gateway provide WAF rules, bot mitigation, and DDoS protection in front of APIs.
use_cases:
- name: API Edge Termination
  description: Front internal APIs with NGINX, HAProxy, or Envoy to handle TLS, HTTP/2,
    HTTP/3, compression, and request normalization before requests reach application
    servers.
- name: Multi-Cluster Ingress
  description: Use Envoy Gateway, Emissary, Ambassador, or Traefik as Kubernetes ingress
    controllers to expose APIs running across multiple clusters and namespaces.
- name: Service Mesh East-West Traffic
  description: Deploy Istio, Linkerd, or Consul Connect to manage service-to-service
    API calls with mTLS, retries, and traffic policy inside a Kubernetes cluster.
- name: Global API Acceleration
  description: Front public APIs with Cloudflare, Fastly, or Akamai to terminate connections
    at the edge, cache safe responses, and absorb DDoS traffic.
- name: Canary and Progressive Delivery
  description: Use proxy-based traffic splitting in Envoy, Istio, or Linkerd to shift
    a percentage of API traffic to a new version and roll back on error budget breach.
- name: Legacy API Modernization
  description: Place HAProxy, NGINX, or Apache HTTP Server in front of legacy SOAP
    or HTTP services to add TLS, modern auth, rate limiting, and observability without
    rewriting the backend.
- name: API Migration and Strangler Pattern
  description: Use a reverse proxy to gradually route traffic from a legacy monolith
    API to new microservice APIs based on path or header rules.
integrations:
- name: Envoy
  description: CNCF L7 proxy used as the data plane for Istio, Consul Connect, Envoy
    Gateway, Ambassador, and Emissary, with an xDS configuration API.
- name: NGINX
  description: Widely deployed open-source web server and reverse proxy with HTTP/2,
    HTTP/3, load balancing, caching, and Lua-based extension via OpenResty.
- name: HAProxy
  description: High-performance TCP and HTTP reverse proxy and load balancer with
    a runtime Data Plane API for dynamic configuration.
- name: Traefik
  description: Cloud-native reverse proxy and ingress controller with automatic service
    discovery for Kubernetes, Docker, and Consul.
- name: Caddy
  description: HTTP/2 reverse proxy with automatic HTTPS via ACME, a JSON config API,
    and a plugin architecture.
- name: Istio
  description: Service mesh that uses Envoy sidecars to provide mTLS, traffic management,
    and policy for Kubernetes APIs.
- name: Linkerd
  description: Lightweight CNCF service mesh built around a purpose-built Rust micro-proxy
    (linkerd2-proxy) for east-west API traffic.
- name: Cloudflare
  description: Global edge proxy and CDN providing TLS termination, WAF, bot management,
    and caching in front of APIs and websites.
