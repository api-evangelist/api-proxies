meta:
  name: API Proxies
  description: An index and topic collection covering reverse-proxy and edge-proxy
    software used in front of APIs, including HTTP reverse proxies, edge proxies,
    load balancers, caching proxies, and service mesh sidecars. API proxies sit between
    API consumers and upstream services to provide TLS termination, routing, rate
    limiting, observability, traffic shaping, caching, authentication enforcement,
    and resilience features such as retries and circuit breaking. This collection
    includes general-purpose reverse proxies like NGINX, HAProxy, Caddy, Apache HTTP
    Server, Traefik, and Varnish, edge and service mesh proxies like Envoy, Linkerd2-proxy,
    Istio, Consul Connect, and AWS App Mesh, and proxy-oriented gateways like KrakenD,
    Tyk, Ambassador, Emissary, and Apache APISIX that overlap with the API gateway
    category but operate primarily as L7 proxies.
  tags:
  - Reverse Proxy
  - Edge Proxy
  - API Proxy
  - Service Mesh Sidecar
  - Load Balancer
  - HTTP Proxy
  - Ingress
  portal: https://apievangelist.com
  github: https://github.com/api-evangelist
  repo: api-proxies
